<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <!-- FullCalendar CSS -->
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet" />

<!-- FullCalendar JS -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

  <title>Schedule Tasks - Schedulo</title>
  <style>
    :root {
      --light-gradient: linear-gradient(135deg, #e0f7fa, #fff3e0);
      --dark-gradient: linear-gradient(135deg, #1e1e2f, #3e3e55);
      --light-btn: linear-gradient(135deg, #42a5f5, #7e57c2);
      --dark-btn: linear-gradient(135deg, #5a189a, #9d4edd);
      --light-hover: linear-gradient(135deg, #1e88e5, #6a1b9a);
      --dark-hover: linear-gradient(135deg, #7b2cbf, #e91e63);
      --text-light: #212121;
      --text-dark: #f1f1f1;
      --glass-bg: rgba(255, 255, 255, 0.1);
    }

    [data-theme="light"] {
      --bg: var(--light-gradient);
      --btn-bg: var(--light-btn);
      --hover-bg: var(--light-hover);
      --text: var(--text-light);
    }

    [data-theme="dark"] {
      --bg: var(--dark-gradient);
      --btn-bg: var(--dark-btn);
      --hover-bg: var(--dark-hover);
      --text: var(--text-dark);
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.5s ease;
    }

    .container {
      max-width: 1100px;
      margin: 50px auto;
      padding: 30px;
    }

    .hero h1 {
  font-size: 4.5rem;
  background: linear-gradient(90deg, #00bcd4, #8e24aa, #ff9800);
  background-size: 300% 300%;
  animation: gradientShift 6s ease infinite;
  color: transparent;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text; /* non-prefixed version for future support */
  text-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
}

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 15px;
      background: var(--glass-bg);
      border-radius: 15px;
      padding: 30px;
      backdrop-filter: blur(10px);
    }

    .day {
      background: var(--btn-bg);
      color: white;
      padding: 20px;
      text-align: center;
      border-radius: 12px;
      font-weight: bold;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      transition: transform 0.3s ease, background 0.4s ease;
      cursor: pointer;
    }

    .day:hover {
      background: var(--hover-bg);
      transform: scale(1.05);
    }

    .btn-3d {
      padding: 12px 26px;
      background: var(--btn-bg);
      color: white;
      font-weight: bold;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 8px 16px rgba(0,0,0,0.3);
      transition: transform 0.2s, background 0.3s;
    }

    .btn-3d:hover {
      background: var(--hover-bg);
      transform: translateY(-2px);
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }

    .theme-toggle {
      cursor: pointer;
      font-size: 0.95rem;
      color: var(--text);
      padding: 8px 12px;
      border-radius: 8px;
      background: var(--glass-bg);
      backdrop-filter: blur(5px);
    }

    @media (max-width: 768px) {
      .calendar {
        grid-template-columns: repeat(2, 1fr);
      }

      .top-bar {
        flex-direction: column;
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <button class="btn-3d" onclick="window.location.href='index.html'">← Back to Dashboard</button>
      <span class="theme-toggle" onclick="toggleTheme()">🌗 Toggle Theme</span>
    </div>

    <h1>📆 Weekly Scheduling Calendar</h1>

    <div class="calendar">
      <div class="day">Sunday</div>
      <div class="day">Monday</div>
      <div class="day">Tuesday</div>
      <div class="day">Wednesday</div>
      <div class="day">Thursday</div>
      <div class="day">Friday</div>
      <div class="day">Saturday</div>
    </div>
  </div>
   <div id="calendar"></div>

  <script>
    function toggleTheme() {
      const htmlTag = document.documentElement;
      const current = htmlTag.getAttribute("data-theme");
      htmlTag.setAttribute("data-theme", current === "dark" ? "light" : "dark");
    }
    
  document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');

    var calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth',   // default view (Month)
      editable: true,                // allow drag & drop
      selectable: true,              // select dates
      headerToolbar: {
        left: 'prev,next today',
        center: 'title',
        right: 'dayGridMonth,timeGridWeek,timeGridDay' // views
      },
      events: [
        { title: 'Team Meeting', start: '2025-08-30T10:00:00' },
        { title: 'Project Deadline', start: '2025-09-05' }
      ]
    });

    calendar.render();
  });


  </script>
</body>
</html>
