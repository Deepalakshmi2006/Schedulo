<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Easy Drag & Drop - Schedulo</title>
  <link rel="stylesheet" href="dragdrop.css" />
  <style>
    .back-btn {
      display: inline-block;
      margin: 20px;
      padding: 10px 20px;
      background-color: #1e88e5;
      color: white;
      text-decoration: none;
      font-weight: bold;
      border-radius: 6px;
      transition: background-color 0.3s;
    }

    .back-btn:hover {
      background-color: #1565c0;
    }
  </style>
</head>
<body>
  <!-- 🔙 Back to Dashboard Button -->
  <a href="index.html" class="back-btn">⬅️ Back to Dashboard</a>

  <div class="container">
    <h1>📅 Easy Drag & Drop</h1>
    <p>Drag tasks from the left and drop them into the calendar.</p>
    
    <div class="drag-area">
      <div class="tasks">
        <div class="task" draggable="true">Meeting with Team</div>
        <div class="task" draggable="true">Code Review</div>
        <div class="task" draggable="true">Design Mockups</div>
      </div>

      <div class="calendar">
        <div class="day" ondrop="drop(event)" ondragover="allowDrop(event)">Monday</div>
        <div class="day" ondrop="drop(event)" ondragover="allowDrop(event)">Tuesday</div>
        <div class="day" ondrop="drop(event)" ondragover="allowDrop(event)">Wednesday</div>
        <div class="day" ondrop="drop(event)" ondragover="allowDrop(event)">Thursday</div>
        <div class="day" ondrop="drop(event)" ondragover="allowDrop(event)">Friday</div>
      </div>
    </div>
  </div>

  <script>
    function allowDrop(ev) {
      ev.preventDefault();
    }

    function drag(ev) {
      ev.dataTransfer.setData("text", ev.target.id);
    }

    function drop(ev) {
      ev.preventDefault();
      const data = ev.dataTransfer.getData("text");
      const task = document.getElementById(data);
      ev.target.appendChild(task);
    }

    // Set unique IDs
    document.querySelectorAll('.task').forEach((task, index) => {
      task.id = `task-${index}`;
      task.setAttribute('ondragstart', 'drag(event)');
    });
  </script>
</body>
</html>
